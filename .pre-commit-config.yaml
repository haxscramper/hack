repos:
  - repo: local
    hooks:
      - id: fix-ai-qt
        name: Fix AI Qt stubs
        entry: ./pre_commit_fix_qt.py
        language: system
        types: [python]
        pass_filenames: true
  - repo: local
    hooks:
      - id: yapf
        name: Format python code
        entry: yapf -i
        language: system
        types: [python]
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        types_or: [c, c++, cuda]
