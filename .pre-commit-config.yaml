repos:
  - repo: local
    hooks:
      - id: yapf
        name: Format python code
        entry: yapf -i
        language: system
        types: [python]
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        types_or: [c, c++, cuda]
